<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVerse V5.8.1</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

<div class="app">

  <header class="top-header">
    <div class="brand-mini">
      <div class="n-logo">CV</div>
      <h1>Ana Sayfa</h1>
    </div>
  </header>

  <div class="search">
    <input id="searchInput" placeholder="Film ara..." />
    <i class="fa-solid fa-magnifying-glass"></i>
  </div>

  <nav class="pill-nav">
    <button onclick="showAllMovies()">Filmler</button>
    <button onclick="showNewMovies()">Yeni ve Popüler</button>
    <button onclick="showMostWatched()">Popüler</button>
    <button onclick="showCategories()">Kategoriler</button>
    <button onclick="showContinueMovies()">Devam Et</button>
  </nav>

  <main>

    <section id="homePage">

      <section class="big-hero">
        <img id="heroImg" src="" alt="">
        <div class="hero-shade"></div>

        <div class="hero-content">
          <span class="mini-logo">CV</span>
          <h2 id="heroTitle"></h2>
          <p id="heroDesc"></p>

          <div class="hero-buttons">
            <button onclick="watchHero()" class="play-main">
              <i class="fa-solid fa-play"></i> Oynat
            </button>

            <button onclick="addHeroToList()" class="list-main">
              <i class="fa-solid fa-plus"></i> Listem
            </button>
          </div>
        </div>
      </section>

      <div class="section-title">
        <h3>▶️ İzlemeye Devam Et</h3>
        <button onclick="showContinueMovies()">Tümünü Gör</button>
      </div>
      <section class="continue-row" id="continuePreview"></section>

      <div class="section-title">
        <h3>🔥 Popüler</h3>
        <button onclick="showMostWatched()">Tümünü Gör</button>
      </div>
      <section class="poster-row" id="popularRow"></section>

      <div class="section-title">
        <h3>✨ Yeni Eklenenler</h3>
        <button onclick="showNewMovies()">Tümünü Gör</button>
      </div>
      <section class="poster-row" id="newRow"></section>

    </section>

    <section id="resultPage" class="hidden">
      <h2 id="resultTitle"></h2>
      <div id="resultGrid" class="result-grid"></div>
    </section>

    <section id="playerPage" class="hidden">
      <button class="back" onclick="goHome()">← Geri Dön</button>
      <h2 id="playerTitle"></h2>

      <div class="netflix-player" id="playerBox">
        <video id="player" playsinline></video>

        <div class="netflix-controls">
          <div class="center-controls">
            <button onclick="back10()" class="circle-control">↺<span>10</span></button>
            <button onclick="playPause()" class="pause-control" id="playPauseBtn">▶</button>
            <button onclick="forward10()" class="circle-control">↻<span>10</span></button>
          </div>

          <div class="progress-wrap">
            <div class="progress-dot"></div>

            <div class="progress-line" onclick="seekVideo(event)">
              <div id="progressFill"></div>
            </div>

            <span id="timeLeft">00:00</span>
          </div>

          <div class="bottom-player-actions">
            <button onclick="fullscreenPlayer()">⛶ Tam Ekran</button>
            <button onclick="back10()">↺ 10 Geri</button>
            <button onclick="forward10()">10 İleri ↻</button>
          </div>
        </div>
      </div>
    </section>

    <section id="aboutPage" class="text-page hidden">
      <h2>Hakkımızda</h2>
      <p>CineVerse modern film ve video deneyimi sunan özel bir platformdur.</p>
    </section>

    <section id="privacyPage" class="text-page hidden">
      <h2>Gizlilik Politikası</h2>
      <p>Favoriler, liste ve son izlenenler cihazınızın tarayıcı hafızasında saklanır.</p>
    </section>

  </main>

  <footer class="bottom-nav">
    <button onclick="goHome()">
      <i class="fa-solid fa-house"></i>
      <span>Ana Sayfa</span>
    </button>

    <button onclick="showList()">
      <i class="fa-solid fa-user"></i>
      <span>Benim CineVerse’im</span>
    </button>
  </footer>

</div>

<div id="movieModal" class="movie-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeDetails()">×</button>

    <img id="modalImg" src="" alt="Film">

    <div class="modal-body">
      <h2 id="modalTitle"></h2>
      <div id="modalMeta"></div>
      <div id="modalDesc"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
